      <stop stop-color="#2B1215"/>
      <stop offset="0.52" stop-color="#16090C"/>
      <stop offset="1" stop-color="#090506"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(297 132) rotate(38.1) scale(398 247)">
      <stop stop-color="#FF7A55" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FF7A55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1027 486) rotate(180) scale(413 289)">
